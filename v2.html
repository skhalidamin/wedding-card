<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zain &amp; Isma &#8212; Wedding</title>
<meta property="og:title" content="Zain Wani &amp; Isma Ashraf &#8212; Wedding Invitation"/>
<meta property="og:description" content="1st &amp; 2nd May 2026 · Noor Bagh, Baramulla"/>
<meta name="theme-color" content="#3b0a1e"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Great+Vibes&family=Outfit:wght@200;300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --wine:#3b0a1e;--wine-deep:#2a0615;--wine-mid:#5c1a35;
  --gold:#c9a34e;--gold-lt:#e8cc6e;--gold-dim:rgba(201,163,78,.12);
  --ivory:#faf6ef;--ivory-warm:#f5ede0;
  --blush:#f8e8e0;--blush-deep:#e8c4b8;
  --sage:#a8c5a0;--sage-dim:rgba(168,197,160,.15);
  --text:#2c1810;--text-lt:#6b4f42;
  --white:#fffdf8;
}

html{scroll-behavior:smooth;scroll-snap-type:y mandatory}
body{background:var(--ivory);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--wine) 0%,var(--wine-deep) 100%);transition:opacity 1.2s cubic-bezier(.4,0,.2,1),visibility 1.2s}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.ld-ornament{width:80px;height:80px;margin-bottom:24px;opacity:0;animation:ldSpin 3s linear infinite,ldFade 1s .2s ease forwards}
@keyframes ldSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes ldFade{to{opacity:.6}}
.ld-bis{font-family:'Amiri',serif;font-size:clamp(1.6rem,4vw,2.6rem);color:var(--gold-lt);direction:rtl;opacity:0;animation:ldFadeUp .8s .4s ease forwards}
.ld-names{font-family:'Great Vibes',cursive;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--blush);margin-top:10px;opacity:0;animation:ldFadeUp .8s .8s ease forwards}
.ld-bar{width:120px;height:1.5px;background:rgba(255,255,255,.08);margin-top:32px;border-radius:2px;overflow:hidden}
.ld-bar::after{content:'';display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--blush-deep),var(--sage));
  transform:scaleX(0);transform-origin:left;animation:ldBar 2.2s .6s cubic-bezier(.4,0,.2,1) forwards}
@keyframes ldFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes ldBar{to{transform:scaleX(1)}}

/* PAGE 1 — HERO */
.page{scroll-snap-align:start;position:relative;z-index:1}
.hero{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(170deg,var(--wine) 0%,var(--wine-mid) 35%,var(--wine-deep) 100%);
  overflow:hidden;position:relative}
#heroCanvas{position:absolute;inset:0;z-index:0;pointer-events:none}
.hero-vignette{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(42,6,21,.6) 100%)}
.hero-glow{position:absolute;z-index:0;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.12}
.hero-glow.g1{width:500px;height:500px;background:var(--gold);top:-10%;left:10%}
.hero-glow.g2{width:400px;height:400px;background:var(--blush-deep);bottom:-5%;right:5%}
.hero-glow.g3{width:300px;height:300px;background:var(--sage);top:50%;left:50%;transform:translate(-50%,-50%)}

.hero-inner{position:relative;z-index:2;text-align:center;padding:40px 24px;max-width:700px}

/* Ornate frame */
.frame{position:absolute;z-index:1;pointer-events:none}
.frame-t,.frame-b{left:50%;transform:translateX(-50%);width:min(480px,75vw);height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35}
.frame-t{top:32px}.frame-b{bottom:32px}
.frame-l,.frame-r{top:50%;transform:translateY(-50%);height:min(420px,65vh);width:1px;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);opacity:.25}
.frame-l{left:32px}.frame-r{right:32px}
.corner{position:absolute;width:20px;height:20px;z-index:1;pointer-events:none}
.corner::before,.corner::after{content:'';position:absolute;background:var(--gold);opacity:.5}
.corner::before{width:20px;height:1px;top:0;left:0}
.corner::after{width:1px;height:20px;top:0;left:0}
.c-tl{top:28px;left:28px}
.c-tr{top:28px;right:28px;transform:scaleX(-1)}
.c-bl{bottom:28px;left:28px;transform:scaleY(-1)}
.c-br{bottom:28px;right:28px;transform:scale(-1)}

/* Typography */
.h-bis{font-family:'Amiri',serif;font-size:clamp(1.4rem,3.5vw,2.2rem);color:var(--gold);direction:rtl;
  opacity:0;animation:hUp .8s .8s ease forwards}
.h-pre{font-size:.55rem;letter-spacing:.8em;text-transform:uppercase;color:var(--gold-lt);font-weight:500;
  margin:18px 0 8px;opacity:0;animation:hUp .8s 1s ease forwards}
.h-invite{font-family:'Cormorant Garamond',serif;font-size:clamp(.88rem,1.8vw,1rem);font-style:italic;
  color:rgba(250,246,239,.45);margin-bottom:28px;opacity:0;animation:hUp .8s 1.1s ease forwards;line-height:1.7}

.h-name{display:block;font-family:'Great Vibes',cursive;font-size:clamp(3.8rem,12vw,8.5rem);
  color:var(--ivory);line-height:1.05;
  opacity:0;transform:translateY(24px) scale(.96);filter:blur(3px);
  transition:all 1.1s cubic-bezier(.16,1,.3,1)}
.h-name.vis{opacity:1;transform:none;filter:none}
.h-name.n1{transition-delay:.2s}
.h-name.n2{transition-delay:1s}
.h-amp{display:block;font-family:'Great Vibes',cursive;font-size:clamp(1.8rem,5vw,3rem);
  color:var(--gold-lt);margin:-2px 0;
  opacity:0;transition:opacity .8s .6s ease}
.h-amp.vis{opacity:1}

.h-div{display:flex;align-items:center;gap:12px;width:min(280px,55vw);margin:24px auto;opacity:0;animation:hUp .8s 1.8s ease forwards}
.h-div span{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,163,78,.4),transparent)}
.h-div i{width:6px;height:6px;border:1px solid var(--gold);transform:rotate(45deg);display:block}

.h-verse{font-family:'Amiri',serif;font-size:clamp(1rem,2.5vw,1.35rem);color:rgba(232,204,110,.7);
  direction:rtl;line-height:1.9;max-width:520px;margin:0 auto 6px;opacity:0;animation:hUp .8s 2s ease forwards}
.h-trans{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.8rem,1.6vw,.9rem);
  color:rgba(250,246,239,.35);max-width:440px;margin:0 auto;line-height:1.7;opacity:0;animation:hUp .8s 2.2s ease forwards}
.h-ref{font-size:.45rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-top:6px;opacity:0;animation:hUp .8s 2.3s ease forwards}

/* Date + Venue pill */
.h-pill{display:inline-flex;align-items:center;gap:24px;margin-top:30px;padding:14px 36px;
  border:1px solid rgba(201,163,78,.25);border-radius:100px;
  background:rgba(255,253,248,.05);backdrop-filter:blur(20px);
  opacity:0;animation:hUp .8s 2.5s ease forwards}
.h-pill-date{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2.5vw,1.3rem);font-weight:600;color:var(--ivory);letter-spacing:.04em}
.h-pill-sep{width:1px;height:28px;background:rgba(201,163,78,.3)}
.h-pill-venue{text-align:left}
.h-pill-vname{font-family:'Cormorant Garamond',serif;font-size:clamp(.9rem,2vw,1.05rem);font-weight:600;color:var(--gold-lt)}
.h-pill-vaddr{font-size:.72rem;color:rgba(250,246,239,.4);margin-top:1px}

.h-scroll{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:2;text-align:center;
  opacity:0;animation:hUp 1s 3s ease forwards}
.h-scroll-line{width:1px;height:28px;margin:0 auto 6px;background:linear-gradient(180deg,transparent,var(--gold-lt));animation:sPulse 2.5s infinite}
.h-scroll-txt{font-size:.4rem;letter-spacing:.6em;text-transform:uppercase;color:rgba(250,246,239,.3)}
@keyframes sPulse{0%,100%{opacity:.2}50%{opacity:.8}}
@keyframes hUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* PAGE 2 — DETAILS */
.details{background:var(--ivory);position:relative}
.details-inner{max-width:860px;margin:0 auto;padding:80px 24px 60px}

.d-label{font-size:.52rem;letter-spacing:.7em;text-transform:uppercase;color:var(--wine-mid);font-weight:600;text-align:center;margin-bottom:10px}
.d-title{font-family:'Great Vibes',cursive;font-size:clamp(2.2rem,5.5vw,3.2rem);color:var(--wine);text-align:center;margin-bottom:36px}

/* Event strip */
.ev-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px}
.ev-item{text-align:center;padding:30px 16px 26px;border-radius:16px;position:relative;overflow:hidden;
  transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s}
.ev-item:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(59,10,30,.08)}
.ev-item::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;border-radius:2px}

.ev-item.i-mehndi{background:linear-gradient(170deg,#f4faf4,#e8f5e8);border:1px solid rgba(168,197,160,.25)}
.ev-item.i-mehndi::after{background:linear-gradient(90deg,transparent,var(--sage),transparent)}
.ev-item.i-gents{background:linear-gradient(170deg,#f0f0fa,#e4e0f5);border:1px solid rgba(120,100,170,.15)}
.ev-item.i-gents::after{background:linear-gradient(90deg,transparent,#9b8ec4,transparent)}
.ev-item.i-ladies{background:linear-gradient(170deg,#faf0f2,#f5e0e5);border:1px solid rgba(196,100,120,.15)}
.ev-item.i-ladies::after{background:linear-gradient(90deg,transparent,#c87088,transparent)}

.ev-emoji{font-size:1.6rem;margin-bottom:10px;display:block}
.ev-name{font-size:.48rem;letter-spacing:.4em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.ev-item.i-mehndi .ev-name{color:#5a8a52}
.ev-item.i-gents .ev-name{color:#7b6baa}
.ev-item.i-ladies .ev-name{color:#b85670}
.ev-time{font-family:'Cormorant Garamond',serif;font-size:1.08rem;font-weight:600;color:var(--text);line-height:1.45}

/* Venue + QR row */
.venue-row{display:flex;align-items:center;justify-content:center;gap:32px;
  padding:28px 36px;border-radius:20px;margin-bottom:36px;
  background:linear-gradient(135deg,var(--ivory-warm),var(--blush));
  border:1px solid rgba(201,163,78,.2);
  box-shadow:0 8px 32px rgba(59,10,30,.04)}
.venue-info{text-align:left}
.venue-icon{font-size:1.4rem;margin-bottom:6px;display:block}
.venue-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--wine)}
.venue-addr{font-size:.82rem;color:var(--text-lt);margin-top:2px}
.venue-qr-wrap{flex-shrink:0}
.venue-qr-wrap a{display:block;padding:8px;background:var(--white);border-radius:10px;text-decoration:none;
  box-shadow:0 2px 12px rgba(59,10,30,.06);transition:transform .3s,box-shadow .3s}
.venue-qr-wrap a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,10,30,.1)}
.venue-qr-wrap img{display:block;border-radius:4px}
.venue-qr-wrap .qr-t{display:block;font-size:.6rem;color:var(--text-lt);font-weight:500;text-align:center;margin-top:4px;letter-spacing:.04em}

/* Countdown */
.cd-strip{display:flex;justify-content:center;gap:10px;margin-bottom:32px;flex-wrap:wrap}
.cd-unit{min-width:80px;padding:20px 12px 16px;border-radius:12px;text-align:center;
  background:linear-gradient(160deg,var(--wine),var(--wine-mid));
  border:1px solid rgba(201,163,78,.15);box-shadow:0 4px 20px rgba(59,10,30,.1)}
.cd-n{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--gold-lt);display:block;line-height:1}
.cd-l{font-size:.4rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(250,246,239,.4);display:block;margin-top:6px;font-weight:500}
.cd-colon{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold-dim);align-self:center;padding-bottom:8px}
.cd-label-row{text-align:center;margin-bottom:14px}
.cd-label-txt{font-size:.48rem;letter-spacing:.6em;text-transform:uppercase;color:var(--gold);font-weight:600}

/* Footer */
.foot{text-align:center;padding:32px 20px;background:var(--wine-deep);position:relative;z-index:1}
.foot-dua{font-family:'Amiri',serif;font-size:.95rem;color:var(--gold);direction:rtl;margin-bottom:10px;opacity:.8}
.foot-name{font-family:'Great Vibes',cursive;font-size:1.6rem;color:var(--blush);display:block;margin-bottom:6px}
.foot-info{font-size:.58rem;letter-spacing:.2em;color:rgba(250,246,239,.25)}
.foot-heart{display:inline-block;color:var(--blush-deep);margin:0 4px;font-size:.7rem;animation:heartBeat 2s infinite}
@keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}}

/* SCROLL REVEAL */
.rv{opacity:0;transform:translateY(30px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.rv.vis{opacity:1;transform:none}
.sg{opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease}
.sg.vis{opacity:1;transform:none}

/* RESPONSIVE */
@media(max-width:640px){
  .ev-strip{grid-template-columns:1fr}
  .venue-row{flex-direction:column;gap:20px;text-align:center;padding:24px 20px}
  .venue-info{text-align:center}
  .h-pill{flex-direction:column;gap:10px;padding:16px 32px;border-radius:20px}
  .h-pill-sep{width:40px;height:1px}
  .h-pill-venue{text-align:center}
  .hero-inner{padding:30px 18px}
  .cd-unit{min-width:68px;padding:16px 8px 12px}
  .frame-l,.frame-r{display:none}
  .corner{display:none}
}
@media(max-width:380px){
  .h-pill{padding:14px 20px}
}
</style>
</head>

/* HERO CANVAS — golden bokeh */
(function(){
  var cv=document.getElementById('heroCanvas');
  if(!cv)return;
  var ctx=cv.getContext('2d');
  var w,ht,pts=[];

  function resize(){
    var p=cv.parentElement;
    w=cv.width=p.offsetWidth;
    ht=cv.height=p.offsetHeight;
    seed();
  }

  function seed(){
    pts=[];
    var n=Math.min(Math.floor(w*ht/10000),80);
    for(var i=0;i<n;i++){
      var isGold=Math.random()>.3;
      pts.push({
        x:Math.random()*w,y:Math.random()*ht,
        r:1.5+Math.random()*4,
        vx:(Math.random()-.5)*.1,
        vy:-.05-Math.random()*.15,
        a:.03+Math.random()*.12,
        phase:Math.random()*Math.PI*2,
        speed:.3+Math.random()*.5,
        color:isGold?[201,163,78]:[248,232,224]
      });
    }
  }

  function draw(t){
    ctx.clearRect(0,0,w,ht);
    pts.forEach(function(p){
      p.x+=p.vx+Math.sin(t*.0005+p.phase)*.15;
      p.y+=p.vy;
      if(p.y<-20){p.y=ht+20;p.x=Math.random()*w;}
      if(p.x<-10)p.x=w+10;if(p.x>w+10)p.x=-10;

      var alpha=p.a*(.5+.5*Math.sin(t*.001*p.speed+p.phase));
      var c=p.color;

      var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
      g.addColorStop(0,'rgba('+c[0]+','+c[1]+','+c[2]+','+alpha+')');
      g.addColorStop(.4,'rgba('+c[0]+','+c[1]+','+c[2]+','+(alpha*.4)+')');
      g.addColorStop(1,'rgba('+c[0]+','+c[1]+','+c[2]+',0)');
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);
      ctx.fillStyle=g;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*.5,0,Math.PI*2);
      ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+(alpha*1.5)+')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize',resize);
  requestAnimationFrame(draw);
})();

/* NAME REVEAL */
function revealAt(id,ms){setTimeout(function(){var el=document.getElementById(id);if(el)el.classList.add('vis');},ms);}
revealAt('nm1',1200);
revealAt('amp',1700);
revealAt('nm2',2200);

/* PARALLAX */
(function(){
  var inner=document.querySelector('.hero-inner');
  var heroEl=document.querySelector('.hero');
  if(!inner||!heroEl)return;
  window.addEventListener('scroll',function(){
    var y=window.scrollY;
    var hh=heroEl.offsetHeight;
    if(y>hh)return;
    var r=y/hh;
    inner.style.transform='translateY('+r*60+'px)';
    inner.style.opacity=String(1-r*.8);
  },{passive:true});
})();

/* SCROLL REVEAL */
(function(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(!en.isIntersecting)return;
      en.target.classList.add('vis');
      en.target.querySelectorAll('.sg').forEach(function(c,i){
        setTimeout(function(){c.classList.add('vis');},i*160);
      });
      obs.unobserve(en.target);
    });
  },{threshold:.05});
  document.querySelectorAll('.rv').forEach(function(el){obs.observe(el);});
})();

/* COUNTDOWN */
(function(){
  var els={d:document.getElementById('cd-d'),h:document.getElementById('cd-h'),
    m:document.getElementById('cd-m'),s:document.getElementById('cd-s')};
  function tick(){
    var diff=W.dt-Date.now();
    if(diff<=0){Object.values(els).forEach(function(x){x.textContent='00';});return;}
    els.d.textContent=String(Math.floor(diff/864e5)).padStart(3,'0');
    els.h.textContent=String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
    els.m.textContent=String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
    els.s.textContent=String(Math.floor((diff%6e4)/1e3)).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
})();

/* LOADER */
window.addEventListener('load',function(){
  setTimeout(function(){document.getElementById('loader').classList.add('out');},2800);
});

})();
