<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Zain &amp; Isma — Wedding Celebration</title>
<meta property="og:title" content="Zain Wani & Isma Ashraf — Wedding Invitation"/>
<meta property="og:description" content="You are cordially invited to celebrate the union of Zain Wani & Isma Ashraf. Bismillah hir-Rahman nir-Raheem."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&family=Great+Vibes&family=DM+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#1a0a2e;--deep2:#0f0720;
  --plum:#3a1856;--plum-lt:#5a2d82;
  --rose:#e8446d;--rose-lt:#ff6b8a;--rose-glow:rgba(232,68,109,.25);
  --gold:#d4a832;--gold-lt:#f0d060;--gold-glow:rgba(212,168,50,.2);
  --peach:#ffb088;--peach-lt:#ffd4bc;
  --teal:#2ec4b6;--teal-lt:#5eeadb;
  --cream:#fff7f0;--cream2:#fff0e6;
  --white:#fffefa;
  --text:#1a0a2e;--text-lt:#5a3d70;
}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:400;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--deep) 0%,var(--plum) 50%,#2a1040 100%);
  transition:opacity 1s ease,visibility 1s ease}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
.loader-bis{font-family:'Amiri',serif;font-size:clamp(2rem,5vw,3.2rem);color:var(--gold-lt);direction:rtl;opacity:0;animation:lFade 1s .3s forwards}
.loader-sub{font-family:'Great Vibes',cursive;font-size:clamp(1.4rem,3vw,2rem);color:var(--rose-lt);margin-top:12px;opacity:0;animation:lFade 1s .8s forwards}
.loader-bar{width:140px;height:2px;background:rgba(255,255,255,.1);margin-top:28px;border-radius:2px;overflow:hidden}
.loader-bar::after{content:'';display:block;width:100%;height:100%;background:linear-gradient(90deg,var(--rose),var(--gold-lt),var(--teal));transform:scaleX(0);transform-origin:left;animation:lBar 2s .5s ease forwards;border-radius:2px}
@keyframes lFade{to{opacity:1}}
@keyframes lBar{to{transform:scaleX(1)}}

/* ── CANVAS ── */
#bgCanvas{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ── SECTIONS ── */
.sec{position:relative;z-index:1;overflow:hidden}
.sec-inner{max-width:920px;margin:0 auto;padding:100px 28px;text-align:center}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(170deg,var(--deep) 0%,var(--plum) 40%,#3d1060 70%,var(--deep2) 100%);
  position:relative;overflow:hidden}
.hero-overlay{position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(232,68,109,.15) 0%,transparent 50%),
  radial-gradient(ellipse at 70% 80%,rgba(46,196,182,.1) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 50%,rgba(212,168,50,.08) 0%,transparent 40%)}
.hero canvas{position:absolute;inset:0;z-index:0}
.hero-content{position:relative;z-index:2;text-align:center;padding:40px 24px}

.hero .label{font-size:.6rem;letter-spacing:.7em;text-transform:uppercase;color:var(--gold-lt);font-weight:500;margin-bottom:14px;opacity:0;animation:fadeUp .8s .3s ease forwards}
.hero .invite{font-family:'Playfair Display',serif;font-size:clamp(.88rem,2vw,1.05rem);font-style:italic;color:rgba(255,247,240,.55);margin-bottom:32px;opacity:0;animation:fadeUp .8s .5s ease forwards}

.hero .name-line{display:block;font-family:'Great Vibes',cursive;font-size:clamp(3.5rem,11vw,8rem);line-height:1.08;color:var(--white);
  opacity:0;transform:translateY(30px) scale(.95);filter:blur(4px)}
.hero .name-line.vis{opacity:1;transform:none;filter:blur(0);transition:all 1s cubic-bezier(.16,1,.3,1)}
.hero .name-line.n1{transition-delay:.6s}
.hero .name-line.n2{transition-delay:1.4s}
.hero .amp-line{display:block;font-family:'Great Vibes',cursive;font-size:clamp(2rem,5vw,3.2rem);color:var(--gold-lt);
  opacity:0;transition:opacity .8s 1s ease}
.hero .amp-line.vis{opacity:1}

.hero .date-pill{display:inline-flex;flex-direction:column;align-items:center;gap:0;
  margin-top:36px;padding:22px 48px 18px;
  border:1.5px solid rgba(212,168,50,.35);border-radius:50px;
  background:rgba(255,255,255,.06);backdrop-filter:blur(16px);
  opacity:0;animation:fadeUp .8s 1.8s ease forwards}
.hero .date-pill .dp-date{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3.2vw,1.7rem);font-weight:700;color:var(--white);letter-spacing:.06em}
.hero .date-pill .dp-div{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-lt),transparent);margin:8px 0}
.hero .date-pill .dp-venue{font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--gold-lt);font-weight:500}
.hero .date-pill .dp-addr{font-size:.78rem;color:rgba(255,247,240,.5);margin-top:2px}

.hero .scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;animation:fadeUp 1s 2.5s ease forwards}
.hero .scroll-dot{width:4px;height:4px;border-radius:50%;background:var(--gold-lt);animation:scrollPulse 2s infinite}
.hero .scroll-txt{font-size:.45rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,247,240,.35)}
@keyframes scrollPulse{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(6px)}}

/* ── COUPLE ── */
.couple-sec{background:linear-gradient(180deg,var(--cream) 0%,var(--cream2) 100%)}
.couple-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:24px;align-items:center;margin-top:48px}
.person{text-align:center}
.person-ring{width:130px;height:130px;border-radius:50%;margin:0 auto 18px;
  background:linear-gradient(135deg,var(--rose-glow),var(--gold-glow));
  border:3px solid var(--gold);padding:4px;
  box-shadow:0 0 0 8px rgba(232,68,109,.08),0 12px 40px rgba(26,10,46,.12)}
.person-ring-inner{width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,var(--cream2),var(--white));
  display:flex;align-items:center;justify-content:center;font-size:3rem}
.person-name{font-family:'Great Vibes',cursive;font-size:2.4rem;color:var(--deep);margin-bottom:4px}
.person-role{font-size:.58rem;letter-spacing:.35em;text-transform:uppercase;color:var(--rose);font-weight:600}
.couple-amp{font-family:'Great Vibes',cursive;font-size:2.8rem;color:var(--gold);text-align:center}

/* ── VERSE ── */
.verse-sec{background:linear-gradient(135deg,var(--deep) 0%,var(--plum) 100%);color:var(--cream)}
.verse-sec .sec-inner{padding:70px 28px}
.verse-ar{font-family:'Amiri',serif;font-size:clamp(1.4rem,3.5vw,2rem);color:var(--gold-lt);direction:rtl;line-height:1.9;margin-bottom:16px}
.verse-en{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.9rem,2vw,1.08rem);color:rgba(255,247,240,.65);max-width:520px;margin:0 auto;line-height:1.8}
.verse-ref{font-size:.5rem;letter-spacing:.35em;text-transform:uppercase;color:var(--teal-lt);margin-top:12px}

/* ── EVENT CARDS ── */
.events-sec{background:var(--cream2)}
.ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
.ev-card{border-radius:16px;padding:36px 20px 30px;text-align:center;position:relative;overflow:hidden;
  transition:transform .4s cubic-bezier(.16,1,.3,1),box-shadow .4s}
.ev-card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(26,10,46,.12)}
.ev-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50px;height:3px;border-radius:3px}

.ev-card.c-venue{background:linear-gradient(145deg,#fff8f2,#fff0e6);border:1.5px solid rgba(212,168,50,.25);grid-column:1/-1;max-width:420px;justify-self:center}
.ev-card.c-venue::before{background:linear-gradient(90deg,var(--gold),var(--peach))}
.ev-card.c-mehndi{background:linear-gradient(145deg,#f0fff4,#e6fff0);border:1.5px solid rgba(46,196,182,.2)}
.ev-card.c-mehndi::before{background:linear-gradient(90deg,var(--teal),var(--teal-lt))}
.ev-card.c-gents{background:linear-gradient(145deg,#f5f0ff,#ede4ff);border:1.5px solid rgba(90,45,130,.15)}
.ev-card.c-gents::before{background:linear-gradient(90deg,var(--plum-lt),var(--rose-lt))}
.ev-card.c-ladies{background:linear-gradient(145deg,#fff0f3,#ffe6eb);border:1.5px solid rgba(232,68,109,.15)}
.ev-card.c-ladies::before{background:linear-gradient(90deg,var(--rose),var(--peach))}

.ev-icon{font-size:2rem;margin-bottom:14px;display:block}
.ev-label{font-size:.52rem;letter-spacing:.45em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.ev-card.c-venue .ev-label{color:var(--gold)}
.ev-card.c-mehndi .ev-label{color:var(--teal)}
.ev-card.c-gents .ev-label{color:var(--plum-lt)}
.ev-card.c-ladies .ev-label{color:var(--rose)}
.ev-val{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;color:var(--deep);line-height:1.5}

.venue-qr{display:inline-block;margin-top:16px;padding:10px;background:var(--white);border-radius:10px;text-decoration:none;
  box-shadow:0 4px 16px rgba(26,10,46,.06);transition:transform .3s,box-shadow .3s}
.venue-qr:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(26,10,46,.1)}
.venue-qr img{display:block;border-radius:6px}
.qr-hint{display:block;margin-top:6px;font-size:.7rem;color:var(--deep);font-weight:600;letter-spacing:.05em;text-align:center}

/* ── COUNTDOWN ── */
.cd-sec{background:linear-gradient(170deg,var(--deep) 0%,#2a1244 40%,var(--plum) 100%);color:var(--cream);position:relative;overflow:hidden}
.cd-sec .cd-glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);opacity:.15;pointer-events:none}
.cd-sec .cd-glow.g1{background:var(--rose);top:-100px;left:-100px}
.cd-sec .cd-glow.g2{background:var(--teal);bottom:-100px;right:-100px}
.cd-grid{display:flex;justify-content:center;gap:14px;margin-top:44px;flex-wrap:wrap;position:relative;z-index:1}
.cd-box{min-width:90px;padding:26px 16px 20px;border-radius:14px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px)}
.cd-num{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:800;display:block;line-height:1;
  background:linear-gradient(135deg,var(--gold-lt),var(--peach));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cd-lbl{font-size:.45rem;letter-spacing:.5em;text-transform:uppercase;color:var(--teal-lt);margin-top:8px;display:block;font-weight:500}
.cd-sep{font-family:'Playfair Display',serif;font-size:2rem;color:rgba(255,255,255,.15);align-self:center;padding-bottom:10px}

/* ── FOOTER ── */
.footer{background:var(--deep2);color:rgba(255,247,240,.4);text-align:center;padding:48px 20px;position:relative;z-index:1;
  border-top:1px solid rgba(212,168,50,.1)}
.footer-dua{font-family:'Amiri',serif;font-size:1.05rem;color:var(--gold-lt);direction:rtl;margin-bottom:14px}
.footer-name{font-family:'Great Vibes',cursive;font-size:2rem;color:var(--rose-lt);display:block;margin-bottom:10px}
.footer-info{font-size:.65rem;letter-spacing:.2em}
.footer-badge{display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:8px 20px;border-radius:20px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);font-size:.6rem;letter-spacing:.15em;color:rgba(255,247,240,.3)}
.footer-badge .heart{color:var(--rose);font-size:.8rem}

/* ── GLOBAL ── */
.sec-label{font-size:.56rem;letter-spacing:.6em;text-transform:uppercase;font-weight:600;margin-bottom:14px}
.sec-title{font-family:'Great Vibes',cursive;font-size:clamp(2.4rem,6vw,3.6rem);margin-bottom:24px}
.sec-text{font-family:'Playfair Display',serif;font-size:clamp(1rem,2vw,1.15rem);line-height:1.9;max-width:520px;margin:0 auto}
.mini-div{display:flex;align-items:center;justify-content:center;gap:14px;width:180px;margin:24px auto}
.mini-div span{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.mini-div i{width:5px;height:5px;background:var(--rose);border-radius:50%;display:block}

.couple-sec .sec-label{color:var(--rose)}
.couple-sec .sec-title{color:var(--deep)}
.couple-sec .sec-text{color:var(--text-lt)}
.events-sec .sec-label{color:var(--gold)}
.events-sec .sec-title{color:var(--deep)}
.events-sec .sec-text{color:var(--text-lt)}
.cd-sec .sec-label{color:var(--teal-lt)}
.cd-sec .sec-title{color:var(--cream)}
.verse-sec .sec-label{color:var(--teal-lt)}

/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(36px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
.rv.vis{opacity:1;transform:none}
.sg{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.sg.vis{opacity:1;transform:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .couple-grid{grid-template-columns:1fr;gap:16px}
  .couple-amp{font-size:2rem}
  .ev-grid{grid-template-columns:1fr}
  .ev-card.c-venue{max-width:none}
  .cd-box{min-width:70px;padding:18px 10px 14px}
  .sec-inner{padding:70px 20px}
  .hero-content{padding:30px 18px}
  .hero .date-pill{padding:18px 32px 14px}
}
</style>
</head>
<body>

<div id="loader">
  <p class="loader-bis">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
  <p class="loader-sub">Zain & Isma</p>
  <div class="loader-bar"></div>
</div>

<canvas id="bgCanvas"></canvas>
<div id="app"></div>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
var D = {
  groom:'Zain Wani', bride:'Isma Ashraf',
  date:'1st & 2nd May 2026',
  weddingDate:new Date('2026-05-01T19:00:00'),
  venue:{name:'Noor Bagh',detail:'Near Masjid Noor, Baramulla'},
  mapsUrl:'https://www.google.com/maps/search/Noor+Bagh+Near+Masjid+Noor+Baramulla',
  qrUrl:'https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https%3A%2F%2Fwww.google.com%2Fmaps%2Fsearch%2FNoor%2BBagh%2BNear%2BMasjid%2BNoor%2BBaramulla&color=1a0a2e&bgcolor=fff7f0',
  quran:{
    ar:'وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً',
    en:'"And among His signs is that He created for you mates from among yourselves, that you may dwell in tranquillity with them, and He has put love and mercy between your hearts."',
    ref:'Surah Ar-Rum (30:21)'
  },
  events:[
    {icon:'📍',label:'Venue',val:'Noor Bagh<br>Near Masjid Noor, Baramulla',cls:'c-venue',full:true,qr:true},
    {icon:'🌙',label:'Mehndiraat',val:'Friday, 1st May<br>7:00 PM',cls:'c-mehndi'},
    {icon:'🍽️',label:'Reception — Gents',val:'Saturday, 2nd May<br>2:00 PM',cls:'c-gents'},
    {icon:'🍽️',label:'Reception — Ladies',val:'Saturday, 2nd May<br>4:00 PM',cls:'c-ladies'}
  ],
  footer:{dua:'بَارَكَ اللَّهُ لَكَ وَبَارَكَ عَلَيْكَ وَجَمَعَ بَيْنَكُمَا فِي خَيْرٍ',name:'Mrs. Late Haji Mohd Ashraf Tanga'}
};

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function h(tag,a){
  var n=document.createElement(tag);
  if(!a)return n;
  if(a.c)n.className=a.c;
  if(a.id)n.id=a.id;
  if(a.t)n.textContent=a.t;
  if(a.h)n.innerHTML=a.h;
  if(a.s)Object.assign(n.style,a.s);
  if(a.at)Object.keys(a.at).forEach(function(k){n.setAttribute(k,a.at[k])});
  if(a.ch)a.ch.forEach(function(c){if(c)n.appendChild(c)});
  return n;
}

/* ═══════════════════════════════════════════
   BUILD HERO
═══════════════════════════════════════════ */
function buildHero(){
  var sec=h('section',{c:'sec hero'});
  sec.appendChild(h('div',{c:'hero-overlay'}));
  var cv=h('canvas',{id:'heroCanvas'});
  sec.appendChild(cv);

  var wrap=h('div',{c:'hero-content',ch:[
    h('p',{c:'label',t:'Together with their families'}),
    h('p',{c:'invite',h:'Request the honour of your Presence at the<br>Wedding Ceremony of'}),
    h('div',{c:'names-wrap',ch:[
      h('span',{c:'name-line n1',id:'n1',t:D.groom}),
      h('span',{c:'amp-line',id:'amp',t:'&'}),
      h('span',{c:'name-line n2',id:'n2',t:D.bride})
    ]}),
    h('div',{c:'date-pill',ch:[
      h('span',{c:'dp-date',t:D.date}),
      h('div',{c:'dp-div'}),
      h('span',{c:'dp-venue',t:'📍 '+D.venue.name}),
      h('span',{c:'dp-addr',t:D.venue.detail})
    ]}),
    h('div',{c:'scroll-hint',ch:[
      h('div',{c:'scroll-dot'}),
      h('span',{c:'scroll-txt',t:'Scroll'})
    ]})
  ]});
  sec.appendChild(wrap);
  return sec;
}

/* ═══════════════════════════════════════════
   BUILD COUPLE
═══════════════════════════════════════════ */
function buildCouple(){
  function person(emoji,name,role){
    return h('div',{c:'person',ch:[
      h('div',{c:'person-ring',ch:[h('div',{c:'person-ring-inner',t:emoji})]}),
      h('p',{c:'person-name',t:name}),
      h('p',{c:'person-role',t:role})
    ]});
  }
  return h('section',{c:'sec couple-sec',ch:[
    h('div',{c:'sec-inner rv',ch:[
      h('p',{c:'sec-label',t:'The Couple'}),
      h('p',{c:'sec-title',t:'Two Hearts, One Soul'}),
      h('p',{c:'sec-text',t:'With the blessings of Allah (SWT) and the prayers of our families, we joyfully announce the union of two hearts.'}),
      h('div',{c:'couple-grid',ch:[
        person('🤵',D.groom,'The Groom'),
        h('div',{c:'couple-amp',t:'&'}),
        person('👰',D.bride,'The Bride')
      ]})
    ]})
  ]});
}

/* ═══════════════════════════════════════════
   BUILD VERSE
═══════════════════════════════════════════ */
function buildVerse(){
  return h('section',{c:'sec verse-sec',ch:[
    h('div',{c:'sec-inner rv',ch:[
      h('p',{c:'sec-label',t:'From the Holy Quran'}),
      h('p',{c:'verse-ar',t:D.quran.ar}),
      h('p',{c:'verse-en',t:D.quran.en}),
      h('p',{c:'verse-ref',t:'— '+D.quran.ref})
    ]})
  ]});
}

/* ═══════════════════════════════════════════
   BUILD EVENTS
═══════════════════════════════════════════ */
function buildEvents(){
  var grid=h('div',{c:'ev-grid'});
  D.events.forEach(function(ev,i){
    var card=h('div',{c:'ev-card sg '+ev.cls+(ev.full?' full':''),ch:[
      h('span',{c:'ev-icon',t:ev.icon}),
      h('p',{c:'ev-label',t:ev.label}),
      h('p',{c:'ev-val',h:ev.val})
    ]});
    card.style.transitionDelay=(i*130)+'ms';
    if(ev.qr){
      var img=h('img',{at:{src:D.qrUrl,alt:'Scan for directions',width:'110',height:'110'}});
      var link=h('a',{c:'venue-qr',at:{href:D.mapsUrl,target:'_blank',rel:'noopener'},ch:[
        img,h('span',{c:'qr-hint',t:'Scan for Directions'})
      ]});
      card.appendChild(link);
    }
    grid.appendChild(card);
  });

  return h('section',{c:'sec events-sec',ch:[
    h('div',{c:'sec-inner rv',ch:[
      h('p',{c:'sec-label',t:'The Celebrations'}),
      h('p',{c:'sec-title',t:'Nikah & Walima'}),

/* ═══════════════════════════════════════════

function buildCountdown(){
  var ids=['cd-d','cd-h','cd-m','cd-s'];

  var grid=h('div',{c:'cd-grid'});
  ids.forEach(function(id,i){
    if(i>0) grid.appendChild(h('span',{c:'cd-sep',t:':'}));
    grid.appendChild(h('div',{c:'cd-box',ch:[
      h('span',{c:'cd-num',id:id,t:'00'}),
      h('span',{c:'cd-lbl',t:labels[i]})
    ]}));
  });
  var sec=h('section',{c:'sec cd-sec',ch:[
    h('div',{c:'cd-glow g1'}),
    h('div',{c:'cd-glow g2'}),
    h('div',{c:'sec-inner rv',ch:[
      h('p',{c:'sec-label',t:'In Shaa Allah'}),
      h('p',{c:'sec-title',t:'Counting the Days'}),
      grid
    ]})
  ]});
  return sec;
}

/* ═══════════════════════════════════════════
   HERO CANVAS — rose petals / particles
═══════════════════════════════════════════ */
(function(){
  var cv=document.getElementById('heroCanvas');
  if(!cv)return;
  var ctx=cv.getContext('2d');
  var w,ht,particles=[];
  var colors=['rgba(232,68,109,','rgba(212,168,50,','rgba(46,196,182,','rgba(255,176,136,'];

  function resize(){
    var hero=cv.parentElement;
    w=cv.width=hero.offsetWidth;
    ht=cv.height=hero.offsetHeight;
    init();
  }
  function init(){
    particles=[];
    var count=Math.min(Math.floor(w*ht/8000),100);
    for(var i=0;i<count;i++){
      particles.push({
        x:Math.random()*w,y:Math.random()*ht,
        r:1+Math.random()*2.5,
        vx:(Math.random()-.5)*.2,
        vy:-.1-Math.random()*.3,
        color:colors[Math.floor(Math.random()*colors.length)],
        alpha:.1+Math.random()*.4,
        phase:Math.random()*Math.PI*2,
        speed:.5+Math.random()
      });
    }
  }
  function draw(t){
    ctx.clearRect(0,0,w,ht);
    particles.forEach(function(p){
      p.x+=p.vx+Math.sin(t*.0008+p.phase)*.3;
      p.y+=p.vy;
      if(p.y<-10){p.y=ht+10;p.x=Math.random()*w}
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      var a=p.alpha*(.6+.4*Math.sin(t*.001*p.speed+p.phase));
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+a+')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize',resize);
  requestAnimationFrame(draw);
})();

/* ═══════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════ */
(function(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting)return;
      e.target.classList.add('vis');
      e.target.querySelectorAll('.sg').forEach(function(c,i){
        setTimeout(function(){c.classList.add('vis')},i*150);
      });
      obs.unobserve(e.target);
    });
  },{threshold:.08});
  document.querySelectorAll('.rv').forEach(function(el){obs.observe(el)});
})();

/* ═══════════════════════════════════════════
   COUNTDOWN
═══════════════════════════════════════════ */
(function(){
  var els={d:document.getElementById('cd-d'),h:document.getElementById('cd-h'),
    m:document.getElementById('cd-m'),s:document.getElementById('cd-s')};
  function tick(){
    var diff=D.weddingDate-Date.now();
    if(diff<=0){Object.values(els).forEach(function(e){e.textContent='00'});return}
    els.d.textContent=String(Math.floor(diff/864e5)).padStart(3,'0');
    els.h.textContent=String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
    els.m.textContent=String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
    els.s.textContent=String(Math.floor((diff%6e4)/1e3)).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
})();

/* ═══════════════════════════════════════════
   SMOOTH PARALLAX on hero
═══════════════════════════════════════════ */
(function(){
  var content=document.querySelector('.hero-content');
  var hero=document.querySelector('.hero');
  if(!content||!hero)return;
  window.addEventListener('scroll',function(){
    var y=window.scrollY;
    var hh=hero.offsetHeight;
    if(y>hh)return;
    var r=y/hh;
    content.style.transform='translateY('+r*50+'px)';
    content.style.opacity=1-r*.7;
  },{passive:true});
})();
